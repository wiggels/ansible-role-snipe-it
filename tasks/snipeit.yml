---
- name: Create install directory
  ansible.builtin.file:
    path: "{{ snipe_install_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  become: true

# Fixes installs laid down by older versions of this role, where the git
# checkout and composer/artisan runs happened as root
- name: Ensure install directory is owned by www-data
  ansible.builtin.file:
    path: "{{ snipe_install_dir }}"
    owner: www-data
    group: www-data
    recurse: true
  become: true

- name: Check if .env already exists
  ansible.builtin.stat:
    path: "{{ snipe_install_dir }}/.env"
  register: env_file
  become: true

- name: Read current app key from .env
  ansible.builtin.command: "grep -oP 'APP_KEY=\\K\\S*' {{ snipe_install_dir }}/.env"
  register: app_key_gather
  when: env_file.stat.exists
  changed_when: false
  failed_when: app_key_gather.rc not in [0, 1]
  become: true

- name: Set gathered app_key fact
  ansible.builtin.set_fact:
    snipe_app_key: "{{ app_key_gather.stdout }}"
  when:
    - env_file.stat.exists
    - app_key_gather.stdout | length > 0

- name: "Checkout Snipe-IT v{{ snipe_install_version }}"
  ansible.builtin.git:
    repo: "{{ snipe_repo_url }}"
    dest: "{{ snipe_install_dir }}"
    version: "v{{ snipe_install_version }}"
  register: snipe_checkout
  become: true
  become_user: www-data

- name: Write .env file to snipe-it directory
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ snipe_install_dir }}/.env"
    owner: www-data
    group: www-data
    mode: '0640'
  register: snipe_env_write
  become: true

- name: Install composer
  ansible.builtin.shell: "set -o pipefail && curl -sS https://getcomposer.org/installer | php{{ snipe_php_ver }}"
  args:
    chdir: "{{ snipe_install_dir }}"
    executable: /bin/bash
    creates: "{{ snipe_install_dir }}/composer.phar"
  environment:
    COMPOSER_HOME: "{{ snipe_install_dir }}/.composer"
  become: true
  become_user: www-data

- name: Install snipe-it dependencies
  ansible.builtin.command: "php{{ snipe_php_ver }} composer.phar install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader"
  args:
    chdir: "{{ snipe_install_dir }}"
  environment:
    COMPOSER_HOME: "{{ snipe_install_dir }}/.composer"
  register: composer_install
  changed_when: "'Nothing to install, update or remove' not in composer_install.stderr"
  become: true
  become_user: www-data

- name: Generate app_key
  ansible.builtin.command: "php{{ snipe_php_ver }} artisan key:generate --force"
  args:
    chdir: "{{ snipe_install_dir }}"
  when: snipe_app_key == 'ChangeMe'
  register: snipe_keygen
  changed_when: true
  become: true
  become_user: www-data

- name: Run database migrations
  ansible.builtin.command: "php{{ snipe_php_ver }} artisan migrate --force"
  args:
    chdir: "{{ snipe_install_dir }}"
  register: snipe_migrate
  changed_when: "'Nothing to migrate' not in snipe_migrate.stdout"
  become: true
  become_user: www-data

- name: Refresh laravel config cache
  ansible.builtin.command: "php{{ snipe_php_ver }} artisan {{ item }}"
  args:
    chdir: "{{ snipe_install_dir }}"
  loop:
    - config:clear
    - config:cache
  when: snipe_checkout.changed
    or snipe_env_write.changed
    or composer_install.changed
    or snipe_keygen.changed | default(false)
    or snipe_migrate.changed
  changed_when: true
  become: true
  become_user: www-data

- name: Set up Laravel scheduler cron
  ansible.builtin.cron:
    name: snipe-it scheduler
    job: "cd {{ snipe_install_dir }} && php{{ snipe_php_ver }} artisan schedule:run >> /dev/null 2>&1"
    user: www-data
  become: true
  when: snipe_scheduler_enabled
