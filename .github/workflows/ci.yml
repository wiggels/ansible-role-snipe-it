---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Monthly run to catch breakage from new Snipe-IT/PHP/package releases
    - cron: "0 6 1 * *"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip3 install ansible-core ansible-lint

      - name: Install galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: Molecule (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu2404
          - ubuntu2604

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip3 install ansible-core molecule "molecule-plugins[docker]" docker

      - name: Install galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule tests
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - lint
      - molecule
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Determines the bump from commit messages since the last tag:
      #   breaking: ... (or feat!:/BREAKING CHANGE) -> major
      #   feat: ...                                 -> minor
      #   fix: ...                                  -> patch
      # Commits that match no rule produce no release.
      - name: Compute next version from commit messages
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          custom_release_rules: "breaking:major"

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
